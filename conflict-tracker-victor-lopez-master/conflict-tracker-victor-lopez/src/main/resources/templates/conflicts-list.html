<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Conflict Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: 'Inter', sans-serif;
        background: #f5f5f5;
        color: #222;
        min-height: 100vh;
    }

    nav {
        background: #1a1a2e;
        padding: 1rem 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    nav .brand {
        color: #fff;
        font-size: 1.1rem;
        font-weight: 600;
        letter-spacing: 0.5px;
    }

    nav .brand span { color: #e94560; }

    .container {
        max-width: 1100px;
        margin: 2.5rem auto;
        padding: 0 1.5rem;
    }

    .page-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 1.5rem;
    }

    .page-header h1 {
        font-size: 1.4rem;
        font-weight: 600;
        color: #1a1a2e;
    }

    .btn {
        display: inline-block;
        padding: 0.5rem 1.1rem;
        border-radius: 6px;
        font-size: 0.85rem;
        font-weight: 500;
        text-decoration: none;
        cursor: pointer;
        transition: background 0.15s;
    }

    .btn-primary {
        background: #e94560;
        color: #fff;
        border: none;
    }

    .btn-primary:hover { background: #c73652; }

    .card {
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        overflow: hidden;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.9rem;
    }

    thead {
        background: #f0f0f0;
    }

    th {
        padding: 0.75rem 1rem;
        text-align: left;
        font-weight: 600;
        font-size: 0.8rem;
        color: #555;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        border-bottom: 1px solid #e0e0e0;
    }

    td {
        padding: 0.85rem 1rem;
        border-bottom: 1px solid #f0f0f0;
        color: #333;
    }

    tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #fafafa; }

    .badge {
        display: inline-block;
        padding: 2px 10px;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 600;
    }

    .badge-ACTIVE  { background: #fde8e8; color: #c0392b; }
    .badge-FROZEN  { background: #e8f4fd; color: #2980b9; }
    .badge-ENDED   { background: #eee; color: #666; }

    .empty {
        padding: 3rem;
        text-align: center;
        color: #999;
        font-size: 0.9rem;
    }
  </style>
</head>
<body>

<nav>
  <span class="brand">Conflict<span>Tracker</span></span>
</nav>

<div class="container">
  <div class="page-header">
    <h1>Llista de Conflictes</h1>
    <a th:href="@{/web/conflicts/new}" class="btn btn-primary">+ Nou Conflicte</a>
  </div>

  <div class="card">
    <table th:if="${!conflicts.isEmpty()}">
      <thead>
      <tr>
        <th>id</th>
        <th>Nom</th>
        <th>Data Inici</th>
        <th>Estat</th>
        <th>Descripció</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="c : ${conflicts}">
        <td th:text="${c.id}"></td>
        <td th:text="${c.name}"></td>
        <td th:text="${c.startDate}"></td>
        <td>
          <span class="badge" th:classappend="'badge-' + ${c.status}" th:text="${c.status}"></span>
        </td>
        <td th:text="${c.description}"></td>
      </tr>
      </tbody>
    </table>
    <div class="empty" th:if="${conflicts.isEmpty()}">
      No hi ha conflictes registrats.
    </div>
  </div>
</div>

</body>
</html>
